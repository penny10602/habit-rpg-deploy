<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#C1644B" />
    <meta name="description" content="Daily RPG - 將習慣養成變成冒險旅程" />

    <!-- PWA / 加入主畫面 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Daily RPG" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Daily RPG 🌱</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0;
        min-height: 100%; min-height: 100dvh;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        /* Prevent zoom on iOS input focus */
        touch-action: manipulation;
      }
      /* iOS safe area */
      #root {
        padding-top: env(safe-area-inset-top);
      }
      /* Prevent pull-to-refresh on mobile */
      body { overscroll-behavior-y: none; }
    </style>
  </head>
  <body>
    <noscript>你需要啟用 JavaScript 來運行此應用。</noscript>
    <div id="root"></div>
  </body>
</html>
